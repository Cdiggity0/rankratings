<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RankRatings – PBR Schedule & Board</title>
  <style>
    :root {
      --pbr-red: #c8102e;
      --pbr-dark: #111111;
      --pbr-gray: #1e1e1e;
      --pbr-light-gray: #cccccc;
      --pbr-accent: #00b050;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #333 0, #000 55%);
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      max-width: 900px;
      width: 100%;
      padding: 24px 20px 32px;
    }

    header {
      border-bottom: 2px solid #333;
      padding-bottom: 12px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .branding-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .branding-sub {
      font-size: 12px;
      color: #aaaaaa;
    }

    .tagline {
      font-size: 14px;
      color: #dddddd;
      max-width: 520px;
    }

    .card {
      margin-top: 18px;
      background: linear-gradient(145deg, #141414, #1e1e1e);
      border-radius: 10px;
      padding: 18px 20px 20px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.65);
      border: 1px solid #2a2a2a;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #bbbbbb;
      margin-bottom: 10px;
    }

    .next-event-name {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .next-event-meta {
      font-size: 13px;
      color: #dddddd;
      margin-bottom: 10px;
    }

    .countdown {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .cd-box {
      min-width: 70px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #101010;
      border: 1px solid #303030;
      text-align: center;
    }

    .cd-value {
      font-size: 20px;
      font-weight: 700;
    }

    .cd-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #bbbbbb;
    }

    .btn {
      display: inline-block;
      border: none;
      border-radius: 4px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      background: var(--pbr-red);
      color: #fff;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s ease, transform 0.05s ease;
      margin-top: 6px;
    }

    .btn:hover {
      background: #e11434;
      transform: translateY(-1px);
    }

    .schedule-card {
      margin-top: 16px;
      background: linear-gradient(145deg, #151515, #1f1f1f);
      border-radius: 10px;
      padding: 12px 14px 14px;
      border: 1px solid #2a2a2a;
      font-size: 13px;
    }

    .schedule-list {
      list-style: none;
      padding: 0;
      margin: 4px 0 0;
    }

    .schedule-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 0;
      border-top: 1px solid #262626;
    }

    .schedule-item:first-child {
      border-top: none;
    }

    .event-title {
      font-weight: 600;
    }

    .event-time {
      color: #cccccc;
      font-size: 12px;
    }

    .event-tag {
      font-size: 11px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    a {
      color: #4ea9ff;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .branding-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <div class="branding-title">RankRatings</div>
        <div class="branding-sub">PBR bull & rider matchup board</div>
      </div>
      <div class="tagline">
        See the next Unleash The Beast and Velocity events at a glance, with a live countdown and full board when it’s time.
      </div>
    </header>

    <div class="card">
      <div class="section-title">Next event</div>
      <div id="nextEventBlock">
        <div class="next-event-name" id="nextEventName">No upcoming event</div>
        <div class="next-event-meta" id="nextEventMeta">Add events to the schedule below.</div>

        <div class="countdown" id="countdown" style="display:none;">
          <div class="cd-box">
            <div class="cd-value" id="cdDays">0</div>
            <div class="cd-label">Days</div>
          </div>
          <div class="cd-box">
            <div class="cd-value" id="cdHours">0</div>
            <div class="cd-label">Hours</div>
          </div>
          <div class="cd-box">
            <div class="cd-value" id="cdMinutes">0</div>
            <div class="cd-label">Minutes</div>
          </div>
          <div class="cd-box">
            <div class="cd-value" id="cdSeconds">0</div>
            <div class="cd-label">Seconds</div>
          </div>
        </div>

        <a href="board.html" class="btn" id="openBoardBtn">
          Open live board
        </a>
      </div>

      <div class="schedule-card">
        <div class="section-title" style="margin-bottom:4px;">Schedule (UTB & Velocity)</div>
        <ul class="schedule-list" id="scheduleList">
          <!-- filled by JS -->
        </ul>
      </div>
    </div>
  </div>

  <script>
    // UTB + Velocity events, up through World Finals (you can tweak times).
    const events = [
      // APRIL 2026
      {
        name: "PBR Billings – Billings, MT",
        tag: "Unleash The Beast",
        time: "2026-04-17T20:45:00"
      },
      {
        name: "PBR Billings – Billings, MT (Round 2)",
        tag: "Unleash The Beast",
        time: "2026-04-18T20:45:00"
      },
      {
        name: "Ram Trucks PBR Knoxville – Knoxville, TN",
        tag: "Pendleton Whisky Velocity Tour",
        time: "2026-04-18T19:00:00"
      },
      {
        name: "Cooper Tires PBR Tacoma – Tacoma, WA",
        tag: "Unleash The Beast",
        time: "2026-04-24T21:45:00"
      },
      {
        name: "Cooper Tires PBR Tacoma – Tacoma, WA (Round 2)",
        tag: "Unleash The Beast",
        time: "2026-04-25T21:45:00"
      },

  
    ];

    const nextEventNameEl = document.getElementById("nextEventName");
    const nextEventMetaEl = document.getElementById("nextEventMeta");
    const countdownEl = document.getElementById("countdown");
    const cdDaysEl = document.getElementById("cdDays");
    const cdHoursEl = document.getElementById("cdHours");
    const cdMinutesEl = document.getElementById("cdMinutes");
    const cdSecondsEl = document.getElementById("cdSeconds");
    const scheduleListEl = document.getElementById("scheduleList");

    function formatEventTime(date) {
      const opts = {
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      };
      return date.toLocaleString(undefined, opts);
    }

    function renderSchedule() {
      scheduleListEl.innerHTML = "";
      if (!events.length) {
        const li = document.createElement("li");
        li.textContent = "No events scheduled.";
        scheduleListEl.appendChild(li);
        return;
      }

      const now = Date.now();

      const futureEvents = events
        .map(e => ({ ...e, ts: new Date(e.time).getTime() }))
        .filter(e => !isNaN(e.ts) && e.ts > now)   // ONLY future
        .sort((a, b) => a.ts - b.ts);

      if (!futureEvents.length) {
        const li = document.createElement("li");
        li.textContent = "No upcoming events.";
        scheduleListEl.appendChild(li);
        return;
      }

      futureEvents.forEach(evt => {
        const li = document.createElement("li");
        li.className = "schedule-item";

        const left = document.createElement("div");
        const right = document.createElement("div");

        const title = document.createElement("div");
        title.className = "event-title";
        title.textContent = evt.name;

        const tag = document.createElement("div");
        tag.className = "event-tag";
        tag.textContent = evt.tag || "";

        left.appendChild(title);
        if (evt.tag) left.appendChild(tag);

        const when = document.createElement("div");
        when.className = "event-time";
        const d = new Date(evt.time);
        when.textContent = formatEventTime(d);

        right.appendChild(when);

        li.appendChild(left);
        li.appendChild(right);
        scheduleListEl.appendChild(li);
      });
    }

    function findNextEvent() {
      const now = Date.now();
      const future = events
        .map(e => ({ ...e, ts: new Date(e.time).getTime() }))
        .filter(e => !isNaN(e.ts) && e.ts > now)   // ONLY future
        .sort((a, b) => a.ts - b.ts);

      return future.length ? future[0] : null;
    }

    function startCountdown(targetEvent) {
      if (!targetEvent) {
        countdownEl.style.display = "none";
        nextEventNameEl.textContent = "No upcoming event";
        nextEventMetaEl.textContent = "Add events to the schedule to see a countdown.";
        return;
      }

      const targetTime = new Date(targetEvent.time).getTime();
      nextEventNameEl.textContent = targetEvent.name;
      nextEventMetaEl.textContent = (targetEvent.tag || "") +
        (targetEvent.tag ? " • " : "") +
        formatEventTime(new Date(targetEvent.time));
      countdownEl.style.display = "flex";

      function update() {
        const now = Date.now();
        let diff = Math.max(0, targetTime - now);

        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / (24 * 3600));
        const hours = Math.floor((totalSeconds % (24 * 3600)) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        cdDaysEl.textContent = days;
        cdHoursEl.textContent = hours;
        cdMinutesEl.textContent = minutes;
        cdSecondsEl.textContent = seconds;

        if (diff <= 0) {
          clearInterval(timer);
          nextEventMetaEl.textContent = "Event is starting now.";
        }
      }

      update();
      const timer = setInterval(update, 1000);
    }

    renderSchedule();
    const next = findNextEvent();
    startCountdown(next);
  </script>
</body>
</html>
